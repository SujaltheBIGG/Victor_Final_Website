<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1200px; height:630px; overflow:hidden; }
  .card {
    width:1200px; height:630px; background:#141414;
    display:flex; flex-direction:column; justify-content:center;
    padding:96px; position:relative;
    font-family:-apple-system,"Helvetica Neue",Arial,sans-serif; color:#ffffff;
  }
  .accent { position:absolute; left:0; top:0; width:16px; height:100%; background:#DD360F; }
  .tag { font-size:24px; letter-spacing:.32em; text-transform:uppercase; color:#DD360F; font-weight:600; margin-bottom:30px; }
  .name { font-size:150px; font-weight:700; letter-spacing:-5px; line-height:.92; }
  .sub { font-size:40px; color:#b9b9b9; font-weight:400; margin-top:34px; letter-spacing:-1px; }
  .corner { position:absolute; right:96px; bottom:90px; font-size:22px; letter-spacing:.18em; text-transform:uppercase; color:#7a7a7a; }
</style>
</head>
<body>
  <div class="card">
    <div class="accent"></div>
    <div class="tag">Digital Design Studio</div>
    <div class="name">Atelier Agency</div>
    <div class="sub">Build, Think, without Limits&trade;</div>
    <div class="corner">atelier.com</div>
  </div>
</body>
</html>
